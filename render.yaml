services:
  - type: web
    name: bruno-rebaza-ttd-label-verification
    runtime: python
    plan: free
    buildCommand: "uv sync --frozen --no-dev && uv cache prune --ci"
    startCommand: "uv run --no-sync uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: CORS_ALLOWED_ORIGINS
        value: https://bruno-rebaza-ttd-label-verification.vercel.app
      - key: VISION_PROVIDER
        value: openai
      - key: VISION_MODEL
        value: gpt-5.4-mini
      - key: VISION_TIMEOUT_SECONDS
        value: "4"
      - key: VISION_MAX_IMAGE_EDGE_PX
        value: "1280"
      - key: VISION_JPEG_QUALITY
        value: "76"
      - key: MAX_UPLOAD_BYTES
        value: "10485760"
      - key: BATCH_MAX_ITEMS
        value: "10"
      - key: BATCH_WORKER_CONCURRENCY
        value: "3"
      - key: OPENAI_API_KEY
        sync: false
